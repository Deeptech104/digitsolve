<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Digitsolve</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: var(--space-4);
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: hsl(var(--primary));
            cursor: pointer;
        }
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
        }
        #password-display {
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-align: center;
            word-break: break-all;
            padding: var(--space-6);
            background: hsl(var(--bg-glass) / var(--bg-glass-alpha));
            border: 1px solid hsl(var(--border) / 0.5);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            color: hsl(var(--primary));
        }
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex-grow: 1;
            accent-color: hsl(var(--primary));
        }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <nav class="breadcrumbs" aria-label="breadcrumb">
        <div class="container"></div>
    </nav>

    <main class="container">
        <section class="calc-page">
            <h1>Password Generator</h1>
            <p>Create secure, random passwords instantly.</p>

            <div id="password-display">Click Generate</div>

            <div class="input-group">
                <label>Password Length: <span id="length-val">16</span></label>
                <div class="range-container">
                    <input type="range" id="length" min="4" max="64" value="16">
                </div>
            </div>

            <div class="input-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="uppercase" checked>
                    <label for="uppercase">Uppercase Letters (A-Z)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="lowercase" checked>
                    <label for="lowercase">Lowercase Letters (a-z)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="numbers" checked>
                    <label for="numbers">Numbers (0-9)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="symbols" checked>
                    <label for="symbols">Symbols (!@#$%^&*)</label>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: var(--space-6);">
                    <button type="button" id="generate-btn" class="btn" style="flex: 1;">Generate</button>
                    <button type="button" id="copy-btn" class="btn btn-secondary" style="flex: 1;">Copy</button>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadHeader();
            loadFooter();
            renderBreadcrumbs(['password']);

            const lengthSlider = document.getElementById('length');
            const lengthVal = document.getElementById('length-val');
            const generateBtn = document.getElementById('generate-btn');
            const copyBtn = document.getElementById('copy-btn');
            const display = document.getElementById('password-display');

            lengthSlider.addEventListener('input', function() {
                lengthVal.textContent = this.value;
            });

            generateBtn.addEventListener('click', generatePassword);
            copyBtn.addEventListener('click', () => copyToClipboard(display.textContent));

            function generatePassword() {
                const length = parseInt(lengthSlider.value);
                const hasUpper = document.getElementById('uppercase').checked;
                const hasLower = document.getElementById('lowercase').checked;
                const hasNums = document.getElementById('numbers').checked;
                const hasSyms = document.getElementById('symbols').checked;

                const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const lower = 'abcdefghijklmnopqrstuvwxyz';
                const nums = '0123456789';
                const syms = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

                let charset = '';
                if (hasUpper) charset += upper;
                if (hasLower) charset += lower;
                if (hasNums) charset += nums;
                if (hasSyms) charset += syms;

                if (!charset) {
                    display.textContent = 'Select at least one option';
                    display.style.color = 'hsl(var(--error))';
                    return;
                }

                let password = '';
                for (let i = 0; i < length; i++) {
                    password += charset[Math.floor(Math.random() * charset.length)];
                }

                display.textContent = password;
                display.style.color = 'hsl(var(--primary))';
            }

            // Generate initial password
            generatePassword();
        });
    </script>
</body>
</html>
