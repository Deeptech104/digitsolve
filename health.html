<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Calculators - Digitsolve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header"></header>

    <nav class="breadcrumbs" aria-label="breadcrumb">
        <div class="container"></div>
    </nav>

    <main class="container">
        <section class="calc-page">
            <h1>Health Calculators</h1>
            <p>Health and fitness tools.</p>

            <div class="cards-row">
                <a href="bmi.html" class="calc-card">
                    <div class="calc-icon">⚕️</div>
                    <h4>BMI Calculator</h4>
                    <p>Body Mass Index</p>
                </a>
                <a href="calorie.html" class="calc-card">
                    <div class="calc-icon">🍎</div>
                    <h4>Calorie Needs</h4>
                    <p>Daily requirements</p>
                </a>
                <a href="heart-rate.html" class="calc-card">
                    <div class="calc-icon">❤️</div>
                    <h4>Max Heart Rate</h4>
                    <p>Exercise zones</p>
                </a>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="index.html" class="btn btn-secondary">← Back to Home</a>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadHeader();
            loadFooter();
            renderBreadcrumbs(['health']);
        });
    </script>
</body>
</html>
