<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator - Digitsolve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header"></header>

    <nav class="breadcrumbs" aria-label="breadcrumb">
        <div class="container"></div>
    </nav>

    <main class="container">
        <section class="calc-page">
            <h1>Loan Calculator</h1>
            <p>Calculate monthly payments and total interest for any loan.</p>

            <form class="input-group">
                <label>Loan Amount ($)</label>
                <input type="number" id="principal" min="0" step="0.01" required>

                <label>Annual Interest Rate (%)</label>
                <input type="number" id="rate" min="0" max="100" step="0.01" required>

                <label>Loan Term (Years)</label>
                <input type="number" id="years" min="1" max="50" required>

                <button type="submit" class="btn">Calculate</button>
            </form>

            <div id="result-box" class="result-box" style="display: none;">
                <h3>Results</h3>
                <div class="result-item">
                    <strong>Monthly Payment:</strong> <span id="monthly-payment">-</span>
                </div>
                <div class="result-item">
                    <strong>Total Payment:</strong> <span id="total-payment">-</span>
                </div>
                <div class="result-item">
                    <strong>Total Interest:</strong> <span id="total-interest">-</span>
                </div>
                <button type="button" id="copy-results" class="btn btn-secondary">Copy Results</button>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadHeader();
            loadFooter();
            renderBreadcrumbs(['loan']);

            const form = document.querySelector('.input-group');
            const resultBox = document.getElementById('result-box');
            const copyBtn = document.getElementById('copy-results');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                calculateLoan();
            });

            copyBtn.addEventListener('click', function() {
                const results = `Monthly Payment: ${document.getElementById('monthly-payment').textContent}\nTotal Payment: ${document.getElementById('total-payment').textContent}\nTotal Interest: ${document.getElementById('total-interest').textContent}`;
                copyToClipboard(results);
            });

            function calculateLoan() {
                const principal = parseFloat(document.getElementById('principal').value);
                const annualRate = parseFloat(document.getElementById('rate').value) / 100;
                const years = parseInt(document.getElementById('years').value);
                const months = years * 12;
                const monthlyRate = annualRate / 12;

                if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || monthlyRate <= 0) {
                    alert('Please enter valid values.');
                    return;
                }

                // Monthly payment formula: M = P [ r(1+r)^n ] / [ (1+r)^n – 1 ]
                const monthlyPayment = principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
                const totalPayment = monthlyPayment * months;
                const totalInterest = totalPayment - principal;

                document.getElementById('monthly-payment').textContent = formatNumber(monthlyPayment);
                document.getElementById('total-payment').textContent = formatNumber(totalPayment);
                document.getElementById('total-interest').textContent = formatNumber(totalInterest);
                resultBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
