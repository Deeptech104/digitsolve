<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - Digitsolve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header"></header>

    <nav class="breadcrumbs" aria-label="breadcrumb">
        <div class="container"></div>
    </nav>

    <main class="container">
        <section class="calc-page">
            <h1>BMI Calculator</h1>
            <p>Calculate your Body Mass Index and get health classification.</p>

            <form class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" min="20" max="300" step="0.1" required>

                <label>Height (cm)</label>
                <input type="number" id="height" min="100" max="250" step="0.1" required>

                <label>Or Height (feet/inches)</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="number" id="height-feet" min="0" max="8" step="0.1" placeholder="0">
                    <input type="number" id="height-inches" min="0" max="11" step="0.1" placeholder="0">
                </div>

                <button type="submit" class="btn">Calculate BMI</button>
            </form>

            <div id="result-box" class="result-box" style="display: none;">
                <h3>BMI Results</h3>
                <div class="result-item">
                    <strong>BMI:</strong> <span id="bmi-value">-</span>
                </div>
                <div class="result-item">
                    <strong>Classification:</strong> <span id="bmi-category">-</span>
                </div>
                <div class="result-item">
                    <strong>Health Range:</strong> <span id="health-range">-</span>
                </div>
                <button type="button" id="copy-results" class="btn btn-secondary">Copy Results</button>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadHeader();
            loadFooter();
            renderBreadcrumbs(['bmi']);

            const form = document.querySelector('.input-group');
            const resultBox = document.getElementById('result-box');
            const copyBtn = document.getElementById('copy-results');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                calculateBMI();
            });

            copyBtn.addEventListener('click', function() {
                const results = `BMI: ${document.getElementById('bmi-value').textContent}\nClassification: ${document.getElementById('bmi-category').textContent}`;
                copyToClipboard(results);
            });

            function calculateBMI() {
                let weight = parseFloat(document.getElementById('weight').value);
                let heightCm;
                
                // Prefer metric if provided
                if (!isNaN(weight)) {
                    heightCm = parseFloat(document.getElementById('height').value);
                } else {
                    // Use imperial
                    const feet = parseFloat(document.getElementById('height-feet').value);
                    const inches = parseFloat(document.getElementById('height-inches').value);
                    heightCm = (feet * 30.48) + (inches * 2.54);
                }

                if (isNaN(weight) || isNaN(heightCm) || heightCm <= 0) {
                    alert('Please enter valid weight and height.');
                    return;
                }

                const heightM = heightCm / 100;
                const bmi = weight / (heightM * heightM);
                
                document.getElementById('bmi-value').textContent = bmi.toFixed(1);
                document.getElementById('health-range').textContent = '18.5 - 24.9 (Normal)';

                let category, categoryClass = '';
                if (bmi < 18.5) {
                    category = 'Underweight';
                    categoryClass = 'warning';
                } else if (bmi < 25) {
                    category = 'Normal weight';
                    categoryClass = 'success';
                } else if (bmi < 30) {
                    category = 'Overweight';
                    categoryClass = 'warning';
                } else {
                    category = 'Obese';
                    categoryClass = 'error';
                }

                document.getElementById('bmi-category').textContent = category;
                resultBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
